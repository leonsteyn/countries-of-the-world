<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countries of the World</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://www.gstatic.com/charts/loader.js"></script>
  <script src="data/countries.js"></script>
  <script src="js/app.js"></script>
</head>
<body>

<!-- Back-to-hub banner -->
<a href="https://mrssteynsgames.netlify.app" style="
  display:flex;align-items:center;gap:0.5rem;
  background:#1e293b;color:#f8fafc;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  font-size:0.82rem;font-weight:600;
  padding:0.55rem 1.2rem;
  text-decoration:none;letter-spacing:0.01em;
">← All Games</a>

<header class="site-header" id="site-header"></header>

<main class="main-content">
  <div id="card-container"></div>
  <button class="random-btn" onclick="showRandom()">🎲 Show Another Country</button>
  <a class="browse-link" href="#site-header">Or browse by continent ↑</a>
</main>

<script>
  google.charts.load('current', { packages: ['geochart'] });
  google.charts.setOnLoadCallback(onGoogleChartsReady);

  buildHeader(null);

  let lastIndex = -1;

  function showRandom() {
    let idx;
    do { idx = Math.floor(Math.random() * COUNTRIES.length); } while (idx === lastIndex && COUNTRIES.length > 1);
    lastIndex = idx;
    renderCard(COUNTRIES[idx], 'card-container');
  }

  showRandom();
</script>
</body>
</html>
