<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countries of the World – Continent</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="data/countries.js"></script>
  <script src="js/app.js"></script>
</head>
<body>

<!-- Back-to-hub banner -->
<a href="https://mrssteynsgames.netlify.app" style="
  display:flex;align-items:center;gap:0.5rem;
  background:#1e293b;color:#f8fafc;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  font-size:0.82rem;font-weight:600;
  padding:0.55rem 1.2rem;
  text-decoration:none;letter-spacing:0.01em;
">← All Games</a>

<header class="site-header" id="site-header"></header>

<main class="main-content">
  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.75rem;margin-bottom:0.5rem">
    <h2 class="page-title" id="page-title" style="margin:0"></h2>
    <a id="quiz-link" href="quiz.html" class="random-btn"
       style="margin:0;background:linear-gradient(135deg,#059669,#047857);box-shadow:0 4px 15px rgba(5,150,105,0.4);text-decoration:none;display:inline-flex;align-items:center;padding:0.65rem 1.4rem;font-size:0.95rem">
      🧠 Quiz this continent
    </a>
  </div>
  <div class="country-grid" id="country-grid"></div>
</main>

<script>
  const continent = getQueryParam('c') || 'Africa';
  const cfg = CONTINENT_CONFIG[continent] || { color: '#718096', emoji: '🌍' };

  document.title = `Countries of the World – ${continent}`;

  buildHeader(continent);

  document.getElementById('page-title').textContent = `${cfg.emoji} ${continent}`;
  document.getElementById('quiz-link').href = `quiz.html?c=${encodeURIComponent(continent)}`;

  const countries = getCountriesByContinent(continent);
  const grid = document.getElementById('country-grid');

  countries.forEach((country, idx) => {
    const a = document.createElement('a');
    a.className = 'country-btn';
    a.style.background = cfg.color;
    a.href = `country.html?c=${encodeURIComponent(continent)}&i=${idx}`;
    a.textContent = `${country.emoji} ${country.name}`;
    grid.appendChild(a);
  });
</script>
</body>
</html>
